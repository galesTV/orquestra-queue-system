version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: orquestra_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orquestra_queue
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: orquestra_cache
    ports:
      - "6379:6379"

volumes:
  pgdata: